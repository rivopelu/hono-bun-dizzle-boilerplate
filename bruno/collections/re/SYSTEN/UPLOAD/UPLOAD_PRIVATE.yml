info:
  name: UPLOAD PRIVATE
  type: http
  seq: 2

http:
  method: POST
  url: "{{url}}/storage/upload/private"
  body:
    type: multipartForm
    formData:
      - name: file
        type: file
        value: []
        enabled: true
      - name: folder
        type: text
        value: profile-picture
        enabled: true
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
