info:
  name: SIGN UP
  type: http
  seq: 1

http:
  method: POST
  url: "{{url}}/auth/sign-up"
  headers:
    - name: Accept-Language
      value: en
  body:
    type: json
    data: |-
      {
        "name": "cashier testing",
        "email": "cashier@email.com",
        "password": "123456",
        "confirmation_password": "123456"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const responseBody = res.getBody();
        bru.setEnvVar("token", responseBody.response_data.token);
        bru.setEnvVar("hasInvitation", responseBody.response_data.has_invitation);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
