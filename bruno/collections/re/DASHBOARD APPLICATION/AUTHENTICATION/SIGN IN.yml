info:
  name: SIGN IN
  type: http
  seq: 2

http:
  method: POST
  url: "{{url}}/auth/sign-in"
  body:
    type: json
    data: |-
      {
        "email" :  "email@email.com",
        "password" : "123456"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const responseBody = res.getBody();
        bru.setEnvVar("token", responseBody.response_data.token);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
