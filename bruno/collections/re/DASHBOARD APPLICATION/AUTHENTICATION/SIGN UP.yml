info:
  name: SIGN UP
  type: http
  seq: 2

http:
  method: POST
  url: "{{url}}/auth/sign-up"
  headers:
    - name: Accept-Language
      value: en
  body:
    type: json
    data: |-
      {
        "name" : "name testing",
        "email" :  "email@email.com",
        "password" : "123456",
        "confirmation_password" : "123456"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
