info:
  name: UPDATE ME
  type: http
  seq: 1

http:
  method: PATCH
  url: "{{url}}/account/me"
  body:
    type: json
    data: |-
      {
        "name": "Nama Baru",
        "profile_picture": "https://cdn.bikasir.id/avatar.png"
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
