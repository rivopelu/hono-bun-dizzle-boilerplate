info:
  name: CREATE MERCHANT
  type: http
  seq: 1

http:
  method: POST
  url: "{{url}}/merchant"
  body:
    type: json
    data: |-
      {
        "name": "Toko Utama",
        "address": "Jl. Merdeka No. 1, Jakarta",
        "description": "Toko kasir utama",
        "logo_url": null
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
