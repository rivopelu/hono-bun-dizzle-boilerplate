info:
  name: SIGN IN
  type: http
  seq: 4

http:
  method: POST
  url: "{{URL}}/v1/public/auth/sign-in"
  body:
    type: json
    data: |-
      {
          "email": "rivopelu@gmail.com",
          "password": "@Rivopelu123"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.getStatus() === 200 && res.getBody().success) {
            const token = res.getBody().response_data.token;
            bru.setEnvVar("TOKEN", token);
            console.log("Access token berhasil disimpan ke environment!");
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
