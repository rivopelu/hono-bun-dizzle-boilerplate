info:
  name: REJECT_KYC
  type: http
  seq: 4

http:
  method: POST
  url: "{{URL}}/admin/kyc/:id/reject"
  headers:
    - name: x-app-mode
      value: sandbox
  body:
    type: json
    data: |-
      {
          "reject_reasons": ["FOTO_KTP_BURAM"],
          "notes": "Foto KTP buram, silakan upload ulang"
      }
  auth:
    type: bearer
    token: "{{TOKEN}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  # Admin Reject KYC (Admin POV)

  Menolak pengajuan KYC dengan alasan tertentu.
  Status user akan berubah menjadi REJECTED.

  ## Headers
  - `Authorization: Bearer <TOKEN>` (JWT Admin)
  - `x-app-mode: sandbox | production`

  ## Path Parameters
  - `id`: ID KYC record

  ## Body
  - `reject_reasons` (array string, required): daftar kode alasan penolakan
    - `FOTO_KTP_BURAM`
    - `NIK_TIDAK_TERBACA`
    - `NAMA_TIDAK_COCOK`
    - `DATA_TIDAK_LENGKAP`
    - `DOKUMEN_KADALUARSA`
    - `LAINNYA`
  - `notes` (string, optional): catatan tambahan
