info:
  name: GET_TRANSACTION_DETAIL
  type: http
  seq: 5

http:
  method: GET
  url: "{{URL}}/transactions/:transactionId"
  headers:
    - name: x-app-mode
      value: "{{SANDBOX_MODE}}"
  params:
    - name: transactionId
      value: 8ad9f6f14b9e4a07b28a8dbc5cb4561a
      type: path
  auth:
    type: bearer
    token: "{{TOKEN}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  # Transaction Detail (Internal User POV)

  Mengembalikan detail satu transaksi milik user untuk mode aktif (`x-app-mode`),
  dikelompokkan agar mudah dirender. User hanya bisa mengakses transaksi miliknya;
  jika tidak ditemukan / mode tidak cocok / bukan miliknya → 404.

  ## Headers
  - `Authorization: Bearer <TOKEN>` (JWT user)
  - `x-app-mode: sandbox | production`

  ## Contoh Response (200)
  ```json
  {
    "success": true,
    "message": "Berhasil mengambil data transaksi",
    "response_data": {
      "transaction": {
        "id": "8ad9f6f14b9e4a07b28a8dbc5cb4561a",
        "transaction_code": "TXT--20260531-000001",
        "mode": "SANDBOX",
        "type": "TOPUP",
        "status": "SUCCESS",
        "description": "Top-up Wallet"
      },
      "amount_detail": {
        "amount": 100000,
        "total_amount": 101700
      },
      "fee_breakdown": [
        {
          "name": "Biaya Transaksi",
          "description": "Biaya layanan untuk setiap transaksi",
          "type": "PERCENTAGE",
          "rate": "0.7%",
          "amount": 700,
          "direction": "INCREASE"
        },
        {
          "name": "Biaya Admin",
          "description": "Biaya administrasi transaksi",
          "type": "NOMINAL",
          "fixed_amount": 1000,
          "amount": 1000,
          "direction": "INCREASE"
        },
        {
          "name": "Biaya Lainnya",
          "description": "Biaya tambahan lainnya",
          "type": "NOMINAL",
          "fixed_amount": 250,
          "amount": 250,
          "direction": "INCREASE"
        },
        {
          "name": "Diskon",
          "description": "Potongan biaya transaksi 0,25%",
          "type": "PERCENTAGE",
          "rate": "-0.25%",
          "amount": -250,
          "direction": "DECREASE"
        }
      ],
      "payment": {
        "payment_ref": null,
        "qr_string": "000201010212260017ID.CO.ZELPAY.WWW011893600012345678901202041234...",
        "payment_url": "http://localhost:7172/sandbox/pay/8ad9f6f14b9e4a07b28a8dbc5cb4561a",
        "paid_at": "2026-05-31T10:36:04Z",
        "expired_at": "2026-05-31T10:45:46Z"
      },
      "parties": {
        "user_id": "f1a9927100384ba9a15a3dc6cc26b2fa",
        "counterparty_id": null,
        "merchant_id": null,
        "order_id": null
      },
      "metadata": {
        "hint": "Buka payment_url untuk melakukan simulasi pembayaran QRIS di sandbox"
      },
      "audit": {
        "active": true,
        "created_at": "2026-05-31T10:30:46Z",
        "created_by": "f1a9927100384ba9a15a3dc6cc26b2fa",
        "updated_at": "2026-05-31T10:36:04Z",
        "updated_by": "system",
        "deleted_at": null,
        "deleted_by": null
      }
    }
  }
  ```

  ## Catatan
  - `amount_detail.total_amount` diambil dari kolom `grand_total` (dihitung saat transaksi dibuat = `amount` + seluruh biaya, diskon negatif otomatis mengurangi). Tersedia juga di list `GET /transactions`.
  - `fee_breakdown` memakai bentuk yang sama di calculate & create top-up: item `PERCENTAGE` memuat `rate` (mis. `"0.7%"`), item `NOMINAL` memuat `fixed_amount` (Rupiah); keduanya selalu punya `amount` & `direction`. Item `DECREASE` (diskon) bernilai negatif. Item dengan `amount` = 0 tidak ditampilkan.
  - `paid_at`, `expired_at`, dan tanggal di `audit` berupa string ISO 8601 UTC.
  - `metadata.hint` hanya terisi pada mode SANDBOX yang memiliki `payment_url`.
