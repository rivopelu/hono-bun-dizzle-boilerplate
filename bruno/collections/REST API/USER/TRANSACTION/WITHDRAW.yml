info:
  name: WITHDRAW
  type: http
  seq: 7

http:
  method: POST
  url: "{{URL}}/transactions/withdraw"
  headers:
    - name: x-app-mode
      value: "{{SANDBOX_MODE}}"
  body:
    type: json
    data: |-
      {
        "channel_id": "4cd1b60bc0d14b68bc9eb50bd1938acc",
        "account_number": "1234567890",
        "account_holder_name": "John Doe",
        "amount": 50000
      }
  auth:
    type: bearer
    token: "{{TOKEN}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  # Withdraw / Payout (Internal User POV)

  Menarik (payout) dana dari wallet user ke payout channel (bank / e-wallet).

  ## Headers
  - `Authorization: Bearer <TOKEN>` (JWT user)
  - `x-app-mode: sandbox | production`

  ## Body
  - `channel_id` — ID payout channel tujuan (lihat `GET /master-data/payout-channels`).
  - `account_number` — nomor rekening bank / nomor akun e-wallet tujuan.
  - `account_holder_name` — nama pemilik rekening / akun e-wallet.
  - `amount` — nominal penarikan (integer Rupiah, > 0).

  Tujuan (`account_number` + `account_holder_name`) disimpan sebagai `payout_channel_information`
  yang merujuk ke `payout_channel`; transaksi menyimpan `payout_channel_information_id`.

  ## Alur (PENDING → settle)
  1. Saat request: biaya & diskon dihitung, total (`grand_total`) **ditahan** dari saldo, transaksi dibuat berstatus `PENDING`.
  2. Selesaikan via `POST /transactions/:transactionId/settle` agar berstatus `SUCCESS` (simulasi sandbox).
  3. Membatalkan WITHDRAW `PENDING` via `POST /transactions/:transactionId/cancel` akan mengembalikan saldo yang ditahan.

  ## Catatan
  - Penarikan ditolak jika saldo tidak mencukupi (`grand_total`) atau channel tidak `ACTIVE`.
  - Biaya `WITHDRAW`: fee flat Rp 6.500 + diskon 0,25% (lihat `FEE_CONFIG`).

  ## Contoh Response (201)
  ```json
  {
    "success": true,
    "message": "Withdraw initiated successfully",
    "response_data": {
      "id": "tx_...",
      "transaction_code": "TXT--20260601-000001",
      "status": "PENDING",
      "amount": 50000,
      "total_amount": 56375,
      "destination": {
        "payout_channel_information_id": "pci_...",
        "channel_id": "pch_...",
        "channel_code": "BCA",
        "channel_name": "Bank Central Asia",
        "account_number": "1234567890",
        "account_holder_name": "John Doe"
      },
      "fee_breakdown": [
        {
          "name": "Biaya Transaksi",
          "description": "Biaya layanan penarikan",
          "type": "NOMINAL",
          "fixed_amount": 6500,
          "amount": 6500,
          "direction": "INCREASE"
        },
        {
          "name": "Diskon",
          "description": "Potongan biaya transaksi 0,25%",
          "type": "PERCENTAGE",
          "rate": "0.25%",
          "amount": 125,
          "direction": "DECREASE"
        }
      ],
      "created_at": "2026-06-01T10:00:00Z"
    }
  }
  ```
