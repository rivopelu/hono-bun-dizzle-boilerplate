info:
  name: UPLOAD_PUBLIC
  type: http
  seq: 2

http:
  method: POST
  url: "{{URL}}/storage/upload/public"
  body:
    type: multipart-form
    data:
      - name: file
        type: file
        value: []
  auth:
    type: bearer
    token: "{{TOKEN}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
