info:
  name: get my merchant
  type: http
  seq: 3

http:
  method: GET
  url: "{{URL}}/merchant?size=1"
  headers:
    - name: x-app-mode
      value: sandbox
  params:
    - name: q
      value: dfdfdf
      type: query
      disabled: true
    - name: page
      value: "0"
      type: query
      disabled: true
    - name: size
      value: "1"
      type: query
  auth:
    type: bearer
    token: "{{TOKEN}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
