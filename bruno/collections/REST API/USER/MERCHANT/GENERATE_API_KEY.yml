info:
  name: generate api key
  type: http
  seq: 5

http:
  method: POST
  url: "{{URL}}/merchant/:merchantId/api-key"
  headers:
    - name: x-app-mode
      value: sandbox
  params:
    - name: merchantId
      value: 3ef0b4d18c1a44dc9fe11c9c7583f7d8
      type: path
  auth:
    type: bearer
    token: "{{TOKEN}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  # Generate API Key (Internal User POV)

  Membuat API key baru untuk merchant pada mode aktif (`x-app-mode`). Merchant yang
  sama akan memiliki API key **berbeda** untuk `sandbox` (prefix `zp_test_`) dan
  `production` (prefix `zp_live_`). Hanya pemilik merchant (account yang sama) yang
  boleh men-generate; selainnya → 403.

  Generate akan **me-revoke** API key aktif sebelumnya untuk merchant + mode tersebut,
  lalu membuat key baru. Key disimpan sebagai bcrypt hash (untuk validasi) **dan**
  bentuk terenkripsi AES (agar bisa di-reveal).

  ## Headers
  - `Authorization: Bearer <TOKEN>` (JWT user)
  - `x-app-mode: sandbox | production`

  ## Contoh Response (201)
  > `api_key` (key utuh) hanya muncul di response generate & reveal — simpan baik-baik.
  ```json
  {
    "success": true,
    "message": "API key generated successfully",
    "response_data": {
      "id": "ak_01hxyz...",
      "environment": "SANDBOX",
      "api_key": "zp_test_a1b2c3d4e5f6...wxyz",
      "masked": "zp_test_a1b2c3d4••••••••wxyz",
      "last_four": "wxyz",
      "created_date": 1717500000000
    }
  }
  ```
