info:
  name: generate webhook key
  type: http
  seq: 7

http:
  method: POST
  url: "{{URL}}/merchant/:merchantId/webhook-key"
  headers:
    - name: x-app-mode
      value: sandbox
  params:
    - name: merchantId
      value: 3ef0b4d18c1a44dc9fe11c9c7583f7d8
      type: path
  auth:
    type: bearer
    token: "{{TOKEN}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  # Generate Webhook Key (Internal User POV)

  Membuat **webhook signing secret** baru untuk merchant pada mode aktif (`x-app-mode`).
  Secret ini dipakai ZelPay untuk **menandatangani (HMAC) webhook keluar** yang dikirim
  ke endpoint user, dan dipakai user untuk **memverifikasi** keaslian payload. Merchant
  yang sama memiliki webhook key berbeda untuk `sandbox` & `production` (prefix `whsec_`).
  Hanya pemilik merchant yang boleh; selainnya → 403.

  Generate akan **me-revoke** webhook key aktif sebelumnya untuk merchant + mode tersebut.
  Berbeda dari API key, secret ini **tidak** disimpan sebagai bcrypt hash (hanya AES
  terenkripsi) karena dipakai untuk sign/verify, bukan autentikasi request masuk.

  ## Headers
  - `Authorization: Bearer <TOKEN>` (JWT user)
  - `x-app-mode: sandbox | production`

  ## Contoh Response (201)
  > `webhook_key` (secret utuh) hanya muncul di response generate & reveal — simpan baik-baik.
  ```json
  {
    "success": true,
    "message": "Webhook key generated successfully",
    "response_data": {
      "id": "whk_01hxyz...",
      "environment": "SANDBOX",
      "webhook_key": "whsec_a1b2c3d4e5f6...wxyz",
      "masked": "whsec_a1b2c3d4••••••••wxyz",
      "last_four": "wxyz",
      "created_date": 1717500000000
    }
  }
  ```
