info:
  name: GET_BALANCE
  type: http
  seq: 1

http:
  method: GET
  url: "{{URL}}/account/balance"
  headers:
    - name: x-app-mode
      value: sandbox
  auth:
    type: bearer
    token: "{{TOKEN}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  # Account Balance (Internal User POV)

  Mengembalikan saldo user (balance & settlement balance) sesuai mode aktif (`x-app-mode`).

  ## Headers
  - `Authorization: Bearer <TOKEN>` (JWT user)
  - `x-app-mode: sandbox | production`

  ## Contoh Response (200)
  ```json
  {
    "success": true,
    "message": "Success",
    "response_data": {
      "mode": "SANDBOX",
      "balance": "Rp 100.000,00",
      "settlement_balance": "Rp 20.000,00"
    }
  }
  ```
