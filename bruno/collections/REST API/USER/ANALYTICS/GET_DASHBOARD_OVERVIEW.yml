info:
  name: GET_DASHBOARD_OVERVIEW
  type: http
  seq: 1

http:
  method: GET
  url: "{{URL}}/analytics/overview?period=WEEKLY"
  headers:
    - name: x-app-mode
      value: sandbox
  auth:
    type: bearer
    token: "{{TOKEN}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  # Dashboard Overview (Internal User POV)

  Mengembalikan ringkasan analitik dompet user untuk mode aktif (`x-app-mode`).

  ## Headers
  - `Authorization: Bearer <TOKEN>` (JWT user)
  - `x-app-mode: sandbox | production`

  ## Query Parameters
  - `period` (optional) — `DAY`, `WEEKLY` (default), `MONTHLY`, `YEARLY`

  ## Contoh Response (200)
  ```json
  {
    "success": true,
    "message": "Success retrieve dashboard overview",
    "response_data": {
      "mode": "SANDBOX",
      "period": "WEEKLY",
      "current_balance": "Rp 75.000,00",
      "settlement_balance": "Rp 5.000,00",
      "total_money_in": "Rp 100.000,00",
      "total_money_out": "Rp 25.000,00",
      "net_flow": "Rp 75.000,00",
      "in_out_ratio": 4,
      "total_transactions": 4,
      "status_breakdown": {
        "PENDING": 1,
        "AWAITING_PAYMENT": 0,
        "SUCCESS": 3,
        "FAILED": 0,
        "EXPIRED": 0,
        "CANCELLED": 0
      }
    }
  }
  ```

  ## Catatan Field
  - `current_balance` — saldo akun terformat Rupiah sesuai mode (`balance_sandbox` / `balance_production`).
  - `settlement_balance` — saldo siap ditarik terformat Rupiah sesuai mode (`settlement_balance_sandbox` / `settlement_balance_production`).
  - `total_money_in` — total `amount` transaksi SUCCESS terformat Rupiah yang menambah saldo (TOPUP).
  - `total_money_out` — total `amount` transaksi SUCCESS terformat Rupiah yang mengurangi saldo (WITHDRAW/PAYMENT/TRANSFER keluar).
  - `net_flow` — `total_money_in - total_money_out` terformat Rupiah.
  - `in_out_ratio` — `total_money_in / total_money_out` (dibulatkan 2 desimal). `null` jika belum ada uang keluar.
  - `total_transactions` — jumlah seluruh transaksi (semua status).
  - `status_breakdown` — jumlah transaksi per status.
