info:
  name: GET_MONEY_IN_CHART
  type: http
  seq: 2

http:
  method: GET
  url: "{{URL}}/analytics/money-in-chart?period=WEEKLY"
  headers:
    - name: x-app-mode
      value: sandbox
  auth:
    type: bearer
    token: "{{TOKEN}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  # Money In Chart (Internal User POV)

  Mengembalikan data time-series uang masuk (TOPUP + PAYMENT SUCCESS) sesuai mode dan period.

  ## Headers
  - `Authorization: Bearer <TOKEN>` (JWT user)
  - `x-app-mode: sandbox | production`

  ## Query Parameters
  - `period` (optional) — `DAY`, `WEEKLY` (default), `MONTHLY`, `YEARLY`

  ## Contoh Response (200)
  ```json
  {
    "success": true,
    "message": "Success retrieve money-in chart data",
    "response_data": {
      "mode": "SANDBOX",
      "period": "WEEKLY",
      "data": [
        {
          "label": "01 Jun",
          "total_amount": "Rp 100.000,00",
          "numeric_amount": 100000,
          "transaction_count": 2
        }
      ]
    }
  }
  ```
