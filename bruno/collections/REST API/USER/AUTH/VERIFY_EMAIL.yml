info:
  name: VERIFY_EMAIL
  type: http
  seq: 3

http:
  method: POST
  url: "{{URL}}/auth/verify-email"
  auth:
    type: bearer
    token: "{{TOKEN}}"
  body:
    type: json
    data: |-
      {
          "otp": "123456"
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
