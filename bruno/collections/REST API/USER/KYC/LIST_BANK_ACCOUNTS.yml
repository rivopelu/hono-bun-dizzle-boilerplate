info:
  name: LIST_BANK_ACCOUNTS
  type: http
  seq: 3

http:
  method: GET
  url: "{{URL}}/bank-accounts"
  auth:
    type: bearer
    token: "{{TOKEN}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  # List Bank Accounts (User POV)

  Mengembalikan daftar bank account milik user yang sedang login.

  ## Headers
  - `Authorization: Bearer <TOKEN>` (JWT User)
