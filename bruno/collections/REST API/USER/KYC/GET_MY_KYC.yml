info:
  name: GET_MY_KYC
  type: http
  seq: 1

http:
  method: GET
  url: "{{URL}}/kyc"
  auth:
    type: bearer
    token: "{{TOKEN}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  # My KYC Status (User POV)

  Mengembalikan status KYC user yang sedang login.

  ## Headers
  - `Authorization: Bearer <TOKEN>` (JWT User)
