info:
  name: GET_BALANCE
  type: http
  seq: 3

http:
  method: GET
  url: "{{URL}}/v1/integration/balance"
  headers:
    - name: x-api-key
      value: "{{API_KEY}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  # Get Balance (Integration v1)

  Mengembalikan saldo merchant untuk mode aktif (ditentukan dari environment API key).
  Auth API key.

  ## Contoh Response (200)
  ```json
  {
    "success": true,
    "message": "Success retrieve balance",
    "response_data": {
      "merchant_id": "3ef0b4d18c1a44dc9fe11c9c7583f7d8",
      "mode": "SANDBOX",
      "balance": 1030253
    }
  }
  ```
