<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.ico">
  <title>{{appName}} · Status</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a14;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #e8e8ed;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      width: 600px;
      height: 600px;
      top: -200px;
      right: -150px;
      background: radial-gradient(circle, rgba(255,68,0,.15) 0%, transparent 70%);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      width: 500px;
      height: 500px;
      bottom: -150px;
      left: -150px;
      background: radial-gradient(circle, rgba(255,100,60,.1) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      position: relative;
      background: rgba(255,255,255,.03);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 28px;
      padding: 56px 64px;
      text-align: center;
      max-width: 440px;
      width: 90%;
      box-shadow:
        0 0 0 1px rgba(255,255,255,.04),
        0 30px 80px -20px rgba(0,0,0,.8);
      transition: transform .3s ease, box-shadow .3s ease;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow:
        0 0 0 1px rgba(255,255,255,.06),
        0 40px 100px -20px rgba(0,0,0,.9);
    }

    .logo-wrap {
      position: relative;
      width: 72px;
      height: 72px;
      margin: 0 auto 28px;
    }
    .logo-wrap .glow {
      position: absolute;
      inset: -8px;
      background: radial-gradient(circle, rgba(255,68,0,.25) 0%, transparent 70%);
      border-radius: 50%;
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: .4; transform: scale(1); }
      50% { opacity: .8; transform: scale(1.15); }
    }
    .logo { width: 72px; height: auto; position: relative; z-index: 1; }

    h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -.3px;
      background: linear-gradient(135deg, #ff6633 0%, #ff4400 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }
    .subtitle {
      font-size: 13px;
      color: rgba(255,255,255,.3);
      letter-spacing: .3px;
      margin-bottom: 36px;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(255,100,60,.4), transparent);
      margin: 0 auto 32px;
      border-radius: 1px;
    }

    .health {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 32px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 12px rgba(34,197,94,.4);
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: .4; }
    }
    .health-label {
      font-size: 13px;
      color: rgba(255,255,255,.4);
      letter-spacing: .5px;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 32px;
    }
    .stat {
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.04);
      border-radius: 14px;
      padding: 16px 12px;
      transition: background .2s ease, border-color .2s ease;
    }
    .stat:hover {
      background: rgba(255,255,255,.05);
      border-color: rgba(255,255,255,.08);
    }
    .stat-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: rgba(255,255,255,.25);
      margin-bottom: 6px;
    }
    .stat-value {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
    }
    .stat-value.env {
      background: rgba(255,255,255,.05);
      padding: 3px 12px;
      border-radius: 12px;
      font-size: 12px;
      display: inline-block;
    }

    .footer {
      font-size: 11px;
      color: rgba(255,255,255,.15);
      letter-spacing: .5px;
    }
    .footer time {
      color: rgba(255,255,255,.25);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">
      <div class="glow"></div>
      {{{svgLogo}}}
    </div>

    <h1>{{appName}}</h1>
    <p class="subtitle">{{subtitle}}</p>

    <div class="divider"></div>

    <div class="health">
      <span class="dot"></span>
      <span class="health-label">{{health}}</span>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-label">{{labelEnv}}</div>
        <span class="stat-value env">{{appEnv}}</span>
      </div>
      <div class="stat">
        <div class="stat-label">{{labelPort}}</div>
        <div class="stat-value">{{port}}</div>
      </div>
    </div>

    <p class="footer">
      {{labelServerTime}} &middot; <time>{{serverTime}}</time>
    </p>
  </div>
</body>
</html>
